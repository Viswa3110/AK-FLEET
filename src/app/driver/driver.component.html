<div class="modal"  id="userModal" >
  <div class="modal-dialog-lg modal-dialog-scrollable" role="document">
      <div class="modal-content">
          <div class="modal-header">
              <h5 class="modal-title">Create User</h5>
              <button type="button" class="close" (click)="closeModal('userModal')" aria-label="Close">
                  <span aria-hidden="true">&times;</span>
              </button>
          </div>
          <div class="modal-body" style="max-height: 1500px; overflow-y: auto;">
            <div style="padding: 16px; background-color: white;">
              <h1>Register</h1>
              <p>Please fill in this form to create an account.</p>
              <hr style="border: 1px solid #f1f1f1; margin-bottom: 25px;">
          
              <label for="email"><b>Email</b></label>
              <input type="text" [value]="user?.name" placeholder="Enter Email" name="email" id="email" required 
                     style="width: 100%; padding: 15px; margin: 5px 0 22px 0; display: inline-block; border: none; background: #f1f1f1;">
                     <div id="emailError" style="color: red;"></div>
          
              <label for="psw"><b>Password</b></label>
              <input type="text" [value]="user?.password" placeholder="Enter Password" name="psw" id="psw" required 
                     style="width: 100%; padding: 15px; margin: 5px 0 22px 0; display: inline-block; border: none; background: #f1f1f1;">
          
              <button (click)="createuser()" type="submit" style="background-color: #04AA6D; color: white; padding: 16px 20px; margin: 8px 0; border: none; cursor: pointer; width: 100%; opacity: 0.9;">Register</button>
            </div>
            
            <div style="background-color: #f1f1f1; text-align: center; padding: 16px;">
              <p>Already have an account? <a href="#" style="color: dodgerblue;">Sign in</a>.</p>
            </div>
          
          </div>
      </div>
  </div>
</div>
<div class="modal"  id="addModal" >
