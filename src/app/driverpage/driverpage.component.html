 <P>FROM:{{item.from_location}}    / TO:{{item.to_location}}</P>

  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close" (click)="closeModal()">&times;</span>
      <div class="formbold-main-wrapper">
        <div class="formbold-form-wrapper">
          <form action="https://formbold.com/s/FORM_ID" method="POST">
            <div class="formbold-input-group">
              <label for="name" class="formbold-form-label"> Vehicle </label>
              <input type="text" name="name" id="Vehicle" [value]="shift?.truck_no" class="formbold-form-input" disabled />
            </div>
            <div class="formbold-input-group">
              <label for="email" class="formbold-form-label"> Trip Date </label>
              <input type="email" name="lastname" id="tripdate" [value]="shift?.trip_date" class="formbold-form-input" disabled />
            </div>
            <div class="formbold-input-group">
              <label for="age" class="formbold-form-label"> From</label>
              <input type="text" name="age" id="from" [value]="shift?.from_location" class="formbold-form-input" disabled/>
            </div>
            <div class="formbold-input-group">
              <label for="age" class="formbold-form-label"> To</label>
              <input type="text" name="age" id="to" [value]="shift?.to_location" class="formbold-form-input" disabled/>
            </div>
            <div *ngIf="!isStarted" class="formbold-input-group">
              <button type="button" class="formbold-btn" (click)="startTrip()" [disabled]="isStarted">Start</button>
            </div>
            <div *ngIf="isStarted" class="formbold-input-group">
            <button type="button" class="formbold-btn"  [disabled]="isStarted">Started at {{currentDateTime}}</button>
            </div>
            <!-- Start Picture -->
            <div class="formbold-input-group">
              <label for="start_picture" class="formbold-form-label">Start Picture</label>
              <input type="file" name="start_picture" class="formbold-form-input" (change)="handleStartPicture($event)" multiple required />
            </div>
            <!-- <div *ngIf="isStarted"> <label for="stop_picture" class="formbold-form-label">{{currentDateTime}}</label></div> -->
           
            <div class="preview-container">
              <p>Uploaded Images Preview:</p>
              <div *ngFor="let file of startPicture; let i = index" class="image-preview">
                <img [src]="'https://aktyres-in.stackstaging.com/php-truck/class/' + file.location" alt="{{ file.file_name }}" />
                <button (click)="deletestartFile(i)">Delete</button>
              </div>
            </div>
            <!-- Start Remark -->
            <div class="formbold-input-group">
              <label for="start_remark" class="formbold-form-label">Start Remark</label>
              <textarea id="StartRemark" name="start_remark" class="formbold-form-input" rows="5" required></textarea>
            </div>
            <!-- Stop Button -->
            <div class="formbold-input-group" *ngIf="isStarted && !isStopped">
              <button type="button" class="formbold-btn" (click)="stopTrip()">Stop</button>
            </div>
            <div *ngIf="isStopped" class="formbold-input-group">
              <button type="button" class="formbold-btn"  [disabled]="isStarted">Stoped at {{stopcurrentDateTime}}</button>
              </div>
            <!-- Stop Remark and Picture Upload -->
            <div *ngIf="isStarted">
              <div class="formbold-input-group">
                <label for="stop_remark" class="formbold-form-label">Stop Remark</label>
                <textarea id="stopRemark" name="stop_remark" class="formbold-form-input" rows="5" required></textarea>
              </div>
              <!-- Stop Picture -->
              <div class="formbold-input-group">
                <label for="stop_picture" class="formbold-form-label">Stop Picture</label>
                <input type="file" name="stop_picture" class="formbold-form-input" (change)="handleStopPicture($event)" multiple required />
              </div>
              <div class="preview-container">
                <p>Uploaded Images Preview:</p>
                <div *ngFor="let file of uploadResults; let i = index" class="image-preview">
                  <img [src]="'https://aktyres-in.stackstaging.com/php-truck/class/' + file.location" alt="{{ file.file_name }}" />
                  <button (click)="deleteFile(i)">Delete</button>
                </div>
              </div>
            </div>
            <button (click)="submit()" class="formbold-btn">Submit</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * {

    }
    body {
        font-family: 'Inter', sans-serif;
      background-color: #f5f5f5;

    .formbold-main-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
    }
  
    .formbold-form-wrapper {
        margin: 0 auto;
      max-width: 800px;
      width: 100%;
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);

    .formbold-form-img {

    .formbold-input-group {
      margin-bottom: 18px;
    }
  
    .formbold-form-select {
      width: 100%;
      padding: 12px 22px;
      border-radius: 5px;
      border: 1px solid #dde3ec;
      background: #ffffff;
      font-size: 16px;
      color: #536387;
      outline: none;
      resize: none;
    }
  
    .formbold-input-radio-wrapper {
      margin-bottom: 25px;
    }
    .formbold-radio-flex {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .formbold-radio-label {
      font-size: 14px;
      line-height: 24px;
      color: #07074d;
      position: relative;
      padding-left: 25px;
      cursor: pointer;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    .formbold-input-radio {
      position: absolute;
      opacity: 0;
      cursor: pointer;
    }
    .formbold-radio-checkmark {
      position: absolute;
      top: -1px;
      left: 0;
      height: 18px;
      width: 18px;
      background-color: #ffffff;
      border: 1px solid #dde3ec;
      border-radius: 50%;
    }
    .formbold-radio-label
      .formbold-input-radio:checked
      ~ .formbold-radio-checkmark {
      background-color: #6a64f1;
    }
    .formbold-radio-checkmark:after {
      content: '';
      position: absolute;
      display: none;
    }
  
    .formbold-radio-label
      .formbold-input-radio:checked
      ~ .formbold-radio-checkmark:after {
      display: block;
    }
  
    .formbold-radio-label .formbold-radio-checkmark:after {
      top: 50%;
      left: 50%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ffffff;
      transform: translate(-50%, -50%);
    }
  
    .formbold-form-input {
      width: 100%;
      padding: 13px 22px;
      border-radius: 5px;
      border: 1px solid #dde3ec;
      background: #ffffff;
      font-weight: 500;
      font-size: 16px;
      color: #07074d;
      outline: none;
      resize: none;
    }
    .formbold-form-input::placeholder {
      color: #536387;
    }
    .formbold-form-input:focus {
      border-color: #6a64f1;
      box-shadow: 0px 3px 8px rgba(0, 0, 0, 0.05);
    }
    .formbold-form-label {
